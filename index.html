<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <script>
  /* Remove any previously-installed service worker. A controlling SW triggers an
     iOS WebKit bug where cross-origin POST uploads fail with "Load failed". We
     no longer register one; this evicts old ones and reloads once so the page
     is no longer SW-controlled. */
  (function(){
    if(!('serviceWorker' in navigator))return;
    navigator.serviceWorker.getRegistrations().then(function(rs){
      var had=rs.length>0;
      Promise.all(rs.map(function(r){return r.unregister();})).then(function(){
        if(window.caches&&caches.keys){caches.keys().then(function(ks){ks.forEach(function(k){caches.delete(k);});});}
        if(had&&!sessionStorage.getItem('mmqld_sw_removed')){sessionStorage.setItem('mmqld_sw_removed','1');location.reload();}
      });
    }).catch(function(){});
  })();
  </script>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
  <meta name="robots" content="noindex,nofollow" />
  <meta name="theme-color" content="#1E3A8A" />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="My Mechanic QLD" />
  <title>My Mechanic QLD</title>
  <link rel="stylesheet" href="styles.css?v=20" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>

<div class="app">
  <header class="header">
    <button class="hbtn" id="btn-menu" aria-label="Menu"><i data-lucide="menu"></i></button>
    <div style="flex:1">
      <h1>My Mechanic QLD</h1>
      <div class="sub" id="header-sub">Owner console</div>
    </div>
    <button class="hbtn" id="btn-refresh" aria-label="Refresh"><i data-lucide="refresh-cw"></i></button>
  </header>

  <main class="main">
    <section class="view active" id="view-dashboard"></section>
    <section class="view" id="view-inquiries"></section>
    <section class="view" id="view-calendar"></section>
    <section class="view" id="view-search"></section>
    <section class="view" id="view-analytics"></section>
    <section class="view" id="view-invoices"></section>
    <section class="view" id="view-inspections"></section>
  </main>

  <nav class="nav" id="nav">
    <button data-view="dashboard" class="active"><i data-lucide="layout-dashboard"></i>Dashboard</button>
    <button data-view="inquiries"><i data-lucide="inbox"></i>Inquiries</button>
    <button data-view="calendar"><i data-lucide="calendar"></i>Calendar</button>
    <button data-view="search"><i data-lucide="search"></i>Search</button>
    <button data-view="analytics"><i data-lucide="bar-chart-3"></i>Analytics</button>
  </nav>
</div>

<!-- Sidebar drawer -->
<div class="scrim" id="side-scrim"></div>
<aside class="sidebar" id="sidebar">
  <div class="sidebar__head">
    <div class="logo">M</div>
    <div><div class="sidebar__name">My Mechanic QLD</div><div class="sidebar__sub">Owner console</div></div>
  </div>
  <nav class="sidebar__nav" id="sidebar-nav">
    <button data-view="dashboard"><i data-lucide="layout-dashboard"></i>Dashboard</button>
    <button data-view="inquiries"><i data-lucide="inbox"></i>Inquiries</button>
    <button data-view="calendar"><i data-lucide="calendar"></i>Calendar</button>
    <button data-view="search"><i data-lucide="search"></i>Search</button>
    <button data-view="analytics"><i data-lucide="bar-chart-3"></i>Analytics</button>
    <div class="sidebar__divider"></div>
    <button data-view="invoices"><i data-lucide="file-text"></i>Invoices</button>
    <button data-view="inspections"><i data-lucide="clipboard-check"></i>Inspection reports</button>
    <div class="sidebar__divider"></div>
    <a href="invoice/index.html"><i data-lucide="file-plus"></i>New invoice</a>
    <a href="inspection/index.html"><i data-lucide="clipboard-plus"></i>New inspection</a>
  </nav>
  <div class="sidebar__foot">More tools coming soon</div>
</aside>

<!-- bottom sheet (customer detail / reply / message / event) -->
<div class="scrim" id="scrim"></div>
<div class="sheet" id="sheet">
  <div class="grip"></div>
  <div class="shead">
    <div class="ttl">
      <h2 id="sheet-title">Customer</h2>
      <div class="sub" id="sheet-sub"></div>
    </div>
    <button class="x" id="sheet-close" aria-label="Close"><i data-lucide="x"></i></button>
  </div>
  <div class="sbody" id="sheet-body"></div>
</div>

<div class="toasts" id="toasts" aria-live="polite"></div>

<script src="config.js?v=20"></script>
<script src="app.js?v=20"></script>
</body>
</html>
